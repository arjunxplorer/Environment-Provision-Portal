kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: portal
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Grafana NodePort
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      # ArgoCD
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
